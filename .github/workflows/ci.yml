# Runs ktlint, detekt, Android :sample-compose:assembleDebug, and the KMP + iOS simulator
# compile chain used in AGENT.md. macOS (for Xcode / iOS) is optional—enable when ready.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Check and assemble
        run: >
          ./gradlew --no-daemon
          ktlintCheck
          detekt
          :sample-compose:assembleDebug
          :sample-server:compileKotlin
          :mockcat-api:compileAndroidMain
          :mockcat-intercept-ui:compileAndroidMain
          :mockcat-intercept-persistence:compileDebugKotlinAndroid
          :mockcat-intercept-persistence:compileKotlinIosSimulatorArm64
          :mockcat-logger-core:compileAndroidMain
          :mockcat-logger-core:compileKotlinIosSimulatorArm64
          :mockcat-logger-persistence:compileDebugKotlinAndroid
          :mockcat-logger-persistence:compileKotlinIosSimulatorArm64
          :mockcat-logger-okhttp:compileAndroidMain
          :mockcat-intercept-okhttp:compileAndroidMain
          :mockcat-logger-ui:compileAndroidMain
          :mockcat-logger-ui:compileKotlinIosSimulatorArm64
          :mockcat-gradle-plugin:build
          :mockcat-api:allTests
          :mockcat-logger-core:allTests

  ios:
    if: false
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Link iOS sim frameworks
        run: |
          ./gradlew :mockcat-api:linkDebugFrameworkIosSimulatorArm64 \
            :mockcat-intercept-persistence:linkDebugFrameworkIosSimulatorArm64 \
            :mockcat-intercept-urlsession:linkDebugFrameworkIosSimulatorArm64
